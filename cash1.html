<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NAS WATANIA - Payment Receipt</title>

<!-- Excel Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root{
  --bg:#0b1220;
  --card:#0f172a;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --line:#243244;
  --sky:#3aa0ff;
  --sky2:#2b87e6;
  --danger:#ef4444;
  --fieldLine:#223044;
  --shadow: 0 18px 45px rgba(0,0,0,.45);
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
  background:
    radial-gradient(900px 450px at 20% -10%, rgba(58,160,255,.22), transparent 55%),
    radial-gradient(800px 500px at 90% 10%, rgba(43,135,230,.18), transparent 52%),
    var(--bg);
  color:var(--text);
  padding:24px 12px;
}

.shell{ width:min(920px, 100%); margin:0 auto; }

.brandTop{
  display:flex; align-items:center; justify-content:space-between;
  gap:12px; margin-bottom:14px;
}
.brandTitle{ display:flex; align-items:center; gap:12px; }
.logoDot{
  width:14px;height:14px;border-radius:999px;
  background: linear-gradient(135deg, var(--sky), var(--sky2));
  box-shadow: 0 0 0 6px rgba(58,160,255,.10);
}
.brandTitle h1{ margin:0; font-size:18px; letter-spacing:.4px; }
.brandTitle p{ margin:0; color:var(--muted); font-size:12px; }
.badgePill{
  display:inline-flex; align-items:center; gap:8px;
  padding:8px 10px;
  border:1px solid rgba(58,160,255,.25);
  background: rgba(58,160,255,.08);
  border-radius:999px;
  color:#cfe7ff;
  font-size:12px;
}

.card{
  background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
  border:1px solid rgba(36,50,68,.8);
  border-radius:16px;
  box-shadow: var(--shadow);
  overflow:hidden;
}
.cardHeader{
  padding:16px 18px;
  border-bottom:1px solid rgba(36,50,68,.75);
  background: rgba(15,23,42,.55);
  display:flex; align-items:center; justify-content:space-between; gap:10px;
}
.cardHeader h3{ margin:0; font-size:15px; letter-spacing:.3px; }
.cardHeader .sub{ margin:0; color:var(--muted); font-size:12px; }
.cardBody{ padding:16px 18px; }

.hr{ height:1px; background: rgba(36,50,68,.9); margin:14px 0; }

.grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
@media (max-width: 760px){ .grid{ grid-template-columns:1fr; } }

.field label{
  display:block; margin:0 0 6px 2px;
  color:var(--muted); font-size:12px;
}
input, select{
  width:100%;
  padding:11px 12px;
  border-radius:12px;
  border:1px solid var(--fieldLine);
  outline:none;
  font-size:14px;
  background: rgba(11,19,36,.85);
  color:var(--text);
  transition:.15s;
}
input::placeholder{ color: rgba(156,163,175,.85); }
input:focus, select:focus{
  border-color: rgba(58,160,255,.9);
  box-shadow: 0 0 0 4px rgba(58,160,255,.16);
  transform: translateY(-1px);
}
.selectWrap{ position:relative; }
.selectWrap:after{
  content:"";
  position:absolute; right:12px; top:50%;
  width:10px;height:10px;
  border-right:2px solid rgba(229,231,235,.6);
  border-bottom:2px solid rgba(229,231,235,.6);
  transform: translateY(-70%) rotate(45deg);
  pointer-events:none;
}
select{ appearance:none; padding-right:40px; }

.btnRow{ display:flex; gap:10px; flex-wrap:wrap; }
.btn{
  border:none;
  padding:11px 12px;
  border-radius:12px;
  cursor:pointer;
  font-weight:800;
  letter-spacing:.2px;
  transition:.15s;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  user-select:none;
}
.btnPrimary{
  color:#fff;
  background: linear-gradient(135deg, var(--sky), var(--sky2));
  box-shadow: 0 12px 25px rgba(58,160,255,.18);
}
.btnPrimary:hover{ filter:brightness(1.03); transform: translateY(-1px); }
.btnPrimary:active{ transform: translateY(0px); }
.btnGhost{
  color:var(--text);
  background: rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.10);
}
.btnGhost:hover{ background: rgba(255,255,255,.07); transform: translateY(-1px); }
.btnDanger{
  color:#fff;
  background: linear-gradient(135deg, #ef4444, #b91c1c);
}
.btnDanger:hover{ filter:brightness(1.02); transform: translateY(-1px); }

.grow{ flex: 1 1 220px; }
.hidden{ display:none !important; }

.topBar{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
}
.empTag{
  display:inline-flex; align-items:center; gap:8px;
  padding:8px 10px;
  border-radius:999px;
  background: rgba(34,197,94,.10);
  border:1px solid rgba(34,197,94,.25);
  color:#bbf7d0;
  font-weight:800;
  font-size:12px;
}
.empTag b{ color:#86efac; }

/* ===== Print Area ===== */
#printArea{
  margin-top:12px;
  border-radius:16px;
  border:1px solid rgba(36,50,68,.75);
  background:#fff;
  color:#111;
  overflow:hidden;
}
#printArea .printHead{
  padding:14px 16px;
  background:#f3f4f6;
  border-bottom:1px solid #e5e7eb;
  text-align:center;
}
#printArea .printHead h2{
  margin:6px 0 0 0;
  font-size:16px;
  letter-spacing:.4px;
}
.receiptLogo{
  width:260px;
  max-width:90%;
  height:auto;
  object-fit:contain;
  display:block;
  margin: 2px auto 6px auto;
}
#printArea .printBody{ padding:14px 16px; }
.pair{
  display:flex;
  gap:12px;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px dashed #e5e7eb;
  font-size:13px;
}
.pair b{ min-width:140px; }
.pair:last-child{ border-bottom:none; }

.signRow{
  display:flex;
  justify-content:space-between;
  margin-top:45px;
  font-weight:700;
  width:90%;
  margin-left:auto;
  margin-right:auto;
}
.signRow div{
  width:45%;
  text-align:center;
  padding-top:10px;
  border-top:1px solid #000;
}

.printActions{
  padding:12px 16px;
  border-top:1px solid #e5e7eb;
  background:#fafafa;
}

.loginLogo{
  width:240px;
  max-width:90%;
  height:auto;
  object-fit:contain;
  filter: drop-shadow(0 0 15px rgba(58,160,255,.35));
}

@media print{
  body *{ visibility:hidden; }
  #printArea, #printArea *{ visibility:visible; }
  #printArea{ position:absolute; left:0; top:0; width:100%; border:none; box-shadow:none; }
  .printActions{ display:none; }
}
</style>
</head>

<body>
<div class="shell">
  <div class="brandTop">
    <div class="brandTitle">
      <div class="logoDot"></div>
      <div>
        <h1>NAS WATANIA</h1>
        <p>Payment Receipt System</p>
      </div>
    </div>
    <div class="badgePill">Local Storage • Offline</div>
  </div>

  <!-- ===== LOGIN ===== -->
  <div class="card" id="loginBox">
    <div class="cardHeader">
      <div>
        <h3>Login</h3>
        <p class="sub">User: hakeem • Password: 123</p>
      </div>
    </div>
    <div class="cardBody">
      <div style="text-align:center; margin-bottom:12px;">
        <!-- Optional logo (keep file next to html): nas_logo.png -->
        <img src="nas_logo.png" class="loginLogo" alt="NAS Logo" onerror="this.style.display='none'">
      </div>
      <div class="grid">
        <div class="field">
          <label>Username</label>
          <input id="username" placeholder="hakeem" autocomplete="off">
        </div>
        <div class="field">
          <label>Password</label>
          <input id="password" type="password" placeholder="123">
        </div>
      </div>
      <div class="btnRow" style="margin-top:10px;">
        <button class="btn btnPrimary grow" onclick="login()">Login</button>
      </div>
      <p style="margin:10px 0 0; color:var(--muted); font-size:12px;">Tip: Press Enter to login.</p>
    </div>
  </div>

  <!-- ===== MAIN ===== -->
  <div class="card hidden" id="mainBox" style="margin-top:14px;">
    <div class="cardHeader">
      <div class="topBar" style="width:100%;">
        <div class="empTag">User: <b id="empName"></b></div>
        <button class="btn btnDanger" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="cardBody">
      <h3 style="margin-top:0;">Payment Entry</h3>

      <!-- Order requested:
           Date (auto) -> Type (dropdown) -> Amount -> Description -->
      <div class="grid">
        <div class="field">
          <label>Date</label>
          <input id="trxDate" type="date">
        </div>

        <div class="field selectWrap">
          <label>Type</label>
          <select id="trxType">
            <option value="">Select</option>
            <option value="Expense">Expense</option>
            <option value="Watania">Watania</option>
            <option value="Other">Other</option>
            <option value="Revenue">Revenue</option>
          </select>
        </div>

        <div class="field">
          <label>Amount</label>
          <input id="amount" type="number" placeholder="0" step="0.01">
        </div>

        <div class="field" style="grid-column:1 / -1;">
          <label>Description</label>
          <input id="description" placeholder="Write description...">
        </div>
      </div>

      <div class="btnRow" style="margin-top:10px;">
        <button class="btn btnPrimary grow" onclick="saveAndPrepare()">Save + Prepare</button>
        <button class="btn btnGhost grow" onclick="newEntry()">New</button>
      </div>

      <div class="hr"></div>

      <h3 style="margin:0 0 8px 0;">Search by Receipt No</h3>
      <div class="btnRow">
        <input id="searchNo" placeholder="e.g. 2026030001" style="flex:1; min-width:220px;">
        <button class="btn btnGhost" onclick="searchReceipt()">Search</button>
      </div>

      <div id="printArea" class="hidden"></div>

      <div class="hr"></div>

      <h3 style="margin:0 0 8px 0;">Daily Report</h3>
      <div class="btnRow">
        <input type="date" id="reportDate" style="flex:1; min-width:220px;">
        <button class="btn btnPrimary" onclick="exportExcel()">Export Excel (.xlsx)</button>
      </div>

      <p style="margin:10px 0 0; color:var(--muted); font-size:12px;">
        Notes: Data is saved locally in your browser (Offline).
      </p>
    </div>
  </div>
</div>

<script>
/* ===================== SINGLE USER ===================== */
const LOGIN_USER = "hakeem";
const LOGIN_PASS = "123";
let currentUser = localStorage.getItem("currentUser_pay_v2") || "";

/* ===================== STORAGE ===================== */
let payments = JSON.parse(localStorage.getItem("payments_v2")) || [];
let lastReceiptNo = "";
let isLastPrinted = true;

/* ===================== LOGIN ===================== */
function login(){
  const u = (username.value || "").trim().toLowerCase();
  const p = (password.value || "").trim();

  if(u !== LOGIN_USER || p !== LOGIN_PASS){
    alert("Wrong Username or Password");
    return;
  }

  currentUser = u;
  localStorage.setItem("currentUser_pay_v2", currentUser);
  showMain();
}

function logout(){
  localStorage.removeItem("currentUser_pay_v2");
  currentUser = "";
  username.value = "";
  password.value = "";
  loginBox.classList.remove("hidden");
  mainBox.classList.add("hidden");
}

function showMain(){
  empName.innerText = currentUser;
  loginBox.classList.add("hidden");
  mainBox.classList.remove("hidden");

  // Default date today (auto)
  const today = new Date().toISOString().slice(0,10);
  if(!trxDate.value) trxDate.value = today;
  if(!reportDate.value) reportDate.value = today;
}

if(currentUser){ showMain(); }

document.addEventListener("keydown", (e)=>{
  if(e.key === "Enter" && !loginBox.classList.contains("hidden")) login();
});

/* ===================== RECEIPT NO (YYYYMM + 0001...) ===================== */
function generateReceiptNo(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const prefix = String(y) + m;
  const count = payments.filter(r => String(r.receiptNo||"").startsWith(prefix)).length + 1;
  return prefix + String(count).padStart(4,'0');
}

/* ===================== VALIDATE ===================== */
function validate(){
  if(!currentUser) return alert("Please login first"), false;
  if(!trxDate.value) return alert("Select date"), false;
  if(!trxType.value) return alert("Select type"), false;
  if(amount.value === "" || amount.value === null) return alert("Enter amount"), false;

  const amt = Number(amount.value);
  if(!Number.isFinite(amt)) return alert("Amount is invalid"), false;

  return true;
}

/* ===================== SAVE + PREPARE ===================== */
function saveAndPrepare(){
  if(!validate()) return;

  const now = new Date();
  const rec = {
    receiptNo: generateReceiptNo(),
    user: currentUser,
    trxDate: trxDate.value,
    trxType: trxType.value,
    // Optional logic: make Expense negative, Revenue positive
    amount: normalizeAmountByType(Number(amount.value), trxType.value),
    description: (description.value || "").trim(),
    dateTime: now.toISOString()
  };

  payments.push(rec);
  localStorage.setItem("payments_v2", JSON.stringify(payments));

  lastReceiptNo = rec.receiptNo;
  isLastPrinted = false;

  renderPrintArea(rec);

  alert("Saved.\nReceipt No: " + rec.receiptNo + "\nPlease print before New.");
}

function normalizeAmountByType(amt, type){
  const t = String(type||"").toLowerCase();
  if(t === "expense") return -Math.abs(amt);
  if(t === "revenue") return Math.abs(amt);
  return amt; // Watania/Other keep as entered
}

function newEntry(){
  if(!lastReceiptNo || isLastPrinted){
    clearFields();
    return;
  }
  alert("You need to print first.\nReceipt No: " + lastReceiptNo);
}

function clearFields(){
  // keep date
  trxType.value = "";
  amount.value = "";
  description.value = "";

  printArea.classList.add("hidden");
  printArea.innerHTML = "";
}

/* ===================== PRINT RECEIPT ===================== */
function receiptTitleByType(t){
  const low = String(t||"").toLowerCase();
  if(low === "expense") return "PAYMENT RECEIPT (EXPENSE)";
  if(low === "revenue") return "PAYMENT RECEIPT (REVENUE)";
  if(low === "watania") return "PAYMENT RECEIPT (WATANIA)";
  if(low === "other") return "PAYMENT RECEIPT (OTHER)";
  return "PAYMENT RECEIPT";
}

function fmtDateTime(iso){
  // "YYYY-MM-DD HH:mm:ss"
  return String(iso||"").replace("T"," ").slice(0,19);
}

function renderPrintArea(r){
  const title = receiptTitleByType(r.trxType);
  const dt = fmtDateTime(r.dateTime);

  printArea.classList.remove("hidden");
  printArea.innerHTML = `
    <div class="printHead">
      <img src="nas_logo.png" class="receiptLogo" alt="NAS Logo" onerror="this.style.display='none'">
      <h2>${title}</h2>
    </div>

    <div class="printBody">
      <div class="pair"><b>Receipt No</b><span>${escapeHtml(r.receiptNo)}</span></div>
      <div class="pair"><b>Date</b><span>${escapeHtml(r.trxDate)}</span></div>
      <div class="pair"><b>Time</b><span>${escapeHtml(dt)}</span></div>
      <div class="pair"><b>User</b><span>${escapeHtml(r.user)}</span></div>
      <div class="pair"><b>Type</b><span>${escapeHtml(r.trxType)}</span></div>
      <div class="pair"><b>Amount</b><span>${Number(r.amount)||0}</span></div>
      <div class="pair"><b>Description</b><span>${escapeHtml(r.description || "-")}</span></div>

      <div class="signRow">
        <div>Receiver Name</div>
        <div>Delivered By</div>
      </div>

      <div class="signRow" style="margin-top:25px;">
        <div>Financial Manager</div>
        <div>General Manager</div>
      </div>
    </div>

    <div class="printActions">
      <button class="btn btnPrimary" style="width:100%;" onclick="markPrinted()">Print Receipt</button>
    </div>
  `;
}

function escapeHtml(str){
  return String(str ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function markPrinted(){
  isLastPrinted = true;
  window.print();
}

/* ===================== SEARCH ===================== */
function searchReceipt(){
  const no = (searchNo.value || "").trim();
  if(!no) return alert("Enter Receipt No");
  const r = payments.find(x => String(x.receiptNo) === no);
  if(!r) return alert("Not found");
  renderPrintArea(r);
}

/* ===================== EXPORT EXCEL (FILTER BY DATE) ===================== */
function exportExcel(){
  const d = reportDate.value;
  if(!d) return alert("Select date");

  const data = payments.filter(r => r.trxDate === d);
  if(data.length === 0) return alert("No data on this date");

  // SAME ORDER as input: Date -> Type -> Amount -> Description
  // plus extra fields
  const rows = data.map(r => ({
    "Date": r.trxDate,
    "Type": r.trxType,
    "Amount": Number(r.amount) || 0,
    "Description": r.description || "",
    "Receipt No": r.receiptNo,
    "User": r.user,
    "DateTime": fmtDateTime(r.dateTime)
  }));

  const ws = XLSX.utils.json_to_sheet(rows);

  // Auto column widths
  const keys = Object.keys(rows[0]);
  ws["!cols"] = keys.map(k => {
    let maxLen = k.length;
    rows.forEach(r => { maxLen = Math.max(maxLen, String(r[k] ?? "").length); });
    return { wch: Math.min(Math.max(maxLen + 2, 12), 50) };
  });

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Report");
  XLSX.writeFile(wb, "Payment_Report_" + d + ".xlsx");
}

/* ===== default date values ===== */
(function initDefaults(){
  const today = new Date().toISOString().slice(0,10);
  trxDate.value = today;
  reportDate.value = today;
})();
</script>
</body>
</html>
